<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Digital Séance</title>
</head>
<body>
<div id="root"></div>
<script>
window.addEventListener('error', function(e){
  document.getElementById('root').innerHTML =
    '<pre style="color:#f55;background:#000;padding:20px;white-space:pre-wrap;font-family:monospace">' +
    'Error loading the séance:\n' + (e.error ? e.error.stack || e.error.message : e.message) +
    '</pre>';
});
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react" src="./digital-seance.jsx"></script>
</body>
</html>
