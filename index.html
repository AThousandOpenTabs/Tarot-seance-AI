<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Digital Séance</title>
</head>
<body>
<div id="root"></div>
<script>
function showError(err){
  document.getElementById('root').innerHTML =
    '<pre style="color:#f55;background:#000;padding:20px;white-space:pre-wrap;font-family:monospace">' +
    'Error loading the séance:\n' + (err && (err.stack || err.message) || err) +
    '</pre>';
}
window.addEventListener('error', function(e){ showError(e.error || e.message); });
window.addEventListener('unhandledrejection', function(e){ showError(e.reason); });
</script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
fetch('./digital-seance.jsx')
  .then(function(r){ return r.text(); })
  .then(function(code){
    var output = Babel.transform(code, { presets: ['react'], sourceType: 'script' }).code;
    var script = document.createElement('script');
    script.textContent = output;
    document.body.appendChild(script);
  })
  .catch(function(err){ throw err; });
</script>
</body>
</html>
